<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="800" height="480" fill="#1A1A1A"/>

  <!-- Header -->
  <text x="40" y="48" font-size="20" font-weight="600" fill="#FFA01F">PrimeOS Tuner — icon set</text>
  <text x="40" y="68" font-size="11" fill="#888">24×24 line icons · 1.75 stroke · accent #F77254 → #FFA01F</text>

  <!-- ============== NAV TABS (8) ============== -->
  <text x="40" y="108" font-size="11" font-weight="600" letter-spacing="2" fill="#888">NAV TABS</text>

  <!-- Dashboard -->
  <g transform="translate(40 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 18a9 9 0 0 1 18 0"/>
    <path d="M7 18l1 -1"/><path d="M17 18l-1 -1"/>
    <path d="M12 18l4 -7"/>
    <circle cx="12" cy="18" r="1.5" fill="#F77254" stroke="none"/>
  </g>
  <text x="70" y="220" font-size="11" fill="#CCC" text-anchor="middle">Dashboard</text>

  <!-- Optimize -->
  <g transform="translate(140 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 7h16M4 12h16M4 17h16"/>
    <circle cx="15" cy="7" r="2.2" fill="#1A1A1A"/>
    <circle cx="9" cy="12" r="2.2" fill="#1A1A1A"/>
    <circle cx="17" cy="17" r="2.2" fill="#1A1A1A"/>
  </g>
  <text x="170" y="220" font-size="11" fill="#CCC" text-anchor="middle">Optimize</text>

  <!-- Game Boost -->
  <g transform="translate(240 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3c-3 3 -4 7 -4 11v4h8v-4c0 -4 -1 -8 -4 -11z"/>
    <circle cx="12" cy="11" r="1.6"/>
    <path d="M8 18l-2 3M16 18l2 3"/>
    <path d="M10 21l1 -1.5M14 21l-1 -1.5"/>
  </g>
  <text x="270" y="220" font-size="11" fill="#CCC" text-anchor="middle">Game Boost</text>

  <!-- Game Library -->
  <g transform="translate(340 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 9h14a3 3 0 0 1 3 3v2a3 3 0 0 1 -5.4 1.8L15 14H9l-1.6 1.8A3 3 0 0 1 2 14v-2a3 3 0 0 1 3 -3z"/>
    <path d="M7.5 11.5v3M6 13h3"/>
    <circle cx="16" cy="12" r="0.9" fill="#F77254" stroke="none"/>
    <circle cx="17.5" cy="13.5" r="0.9" fill="#F77254" stroke="none"/>
  </g>
  <text x="370" y="220" font-size="11" fill="#CCC" text-anchor="middle">Game Library</text>

  <!-- Bloatware -->
  <g transform="translate(440 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M19 4l-8 8"/>
    <path d="M14 9l4 -4"/>
    <path d="M5 21l5 -5h6l-3 5z"/>
    <path d="M7.5 17v4M10 17v4M12.5 17v4"/>
  </g>
  <text x="470" y="220" font-size="11" fill="#CCC" text-anchor="middle">Bloatware</text>

  <!-- Memory Priority -->
  <g transform="translate(540 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="7" width="18" height="10" rx="1"/>
    <path d="M7 7v10M11 7v10M15 7v10"/>
    <path d="M3 12h18"/>
    <path d="M9 19v2M15 19v2"/>
  </g>
  <text x="570" y="220" font-size="11" fill="#CCC" text-anchor="middle">Memory Priority</text>

  <!-- History -->
  <g transform="translate(640 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 1 0 3 -6.7L3 8"/>
    <path d="M3 4v4h4"/>
    <path d="M12 8v4l3 2"/>
  </g>
  <text x="670" y="220" font-size="11" fill="#CCC" text-anchor="middle">History</text>

  <!-- Settings -->
  <g transform="translate(740 130) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    <path d="M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12 -2.12M16.95 7.05l2.12 -2.12"/>
  </g>
  <text x="770" y="220" font-size="11" fill="#CCC" text-anchor="middle">Settings</text>

  <!-- ============== STATUS BADGES (5) ============== -->
  <text x="40" y="280" font-size="11" font-weight="600" letter-spacing="2" fill="#888">STATUS BADGES</text>

  <!-- Warning -->
  <g transform="translate(40 300) scale(2.5)" fill="none" stroke="#FFA01F" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3l10 17H2z"/>
    <path d="M12 10v5"/>
    <circle cx="12" cy="18" r="0.9" fill="#FFA01F" stroke="none"/>
  </g>
  <text x="70" y="390" font-size="11" fill="#CCC" text-anchor="middle">Warning</text>

  <!-- Lock -->
  <g transform="translate(140 300) scale(2.5)" fill="none" stroke="#888" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="5" y="11" width="14" height="9" rx="1.5"/>
    <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
    <circle cx="12" cy="15" r="0.9" fill="#888" stroke="none"/>
    <path d="M12 16v2"/>
  </g>
  <text x="170" y="390" font-size="11" fill="#CCC" text-anchor="middle">Lock</text>

  <!-- Check -->
  <g transform="translate(240 300) scale(2.5)" fill="none" stroke="#2ECC71" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M8 12.5l3 3 5 -6"/>
  </g>
  <text x="270" y="390" font-size="11" fill="#CCC" text-anchor="middle">Check</text>

  <!-- Lightning -->
  <g transform="translate(340 300) scale(2.5)" fill="none" stroke="#F77254" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 3L4 14h6l-1 7l9 -11h-6l1 -7z"/>
  </g>
  <text x="370" y="390" font-size="11" fill="#CCC" text-anchor="middle">Lightning</text>

  <!-- Restart -->
  <g transform="translate(440 300) scale(2.5)" fill="none" stroke="#FFA01F" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12a9 9 0 1 1 -2.6 -6.4"/>
    <path d="M21 4v5h-5"/>
  </g>
  <text x="470" y="390" font-size="11" fill="#CCC" text-anchor="middle">Restart</text>

  <!-- Footer -->
  <text x="40" y="450" font-size="10" fill="#666">All paths use stroke="currentColor" so colors can be tinted at use site. Files in Assets/Icons/.</text>
</svg>
